<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEasy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0d0d0d;
      --cream: #faf8f4;
      --gold: #c8960c;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--ink);
    }
    header {
      background: white;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      sticky: top;
      gap: 20px;
    }
    .logo { font-size: 1.8rem; font-weight: 900; }
    .logo span { color: var(--gold); }
    .search { flex: 1; max-width: 520px; display: flex; }
    .search input { flex: 1; padding: 10px 16px; border: 1.5px solid #e0e0e0; border-radius: 50px 0 0 50px; }
    .search button { padding: 10px 16px; background: var(--gold); border: none; border-radius: 0 50px 50px 0; cursor: pointer; color: white; }
    .btn-icon { background: white; border: 1.5px solid #e0e0e0; padding: 10px 16px; border-radius: 50px; cursor: pointer; font-size: 0.9rem; gap: 6px; }
    .cart-count { background: #c0392b; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
    nav { background: var(--ink); padding: 0 32px; display: flex; }
    .nav-item { padding: 12px 20px; color: #ccc; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { color: #f0c040; border-color: var(--gold); }
    .container { display: grid; grid-template-columns: 260px 1fr; max-width: 1280px; margin: 0 auto; }
    .sidebar { background: white; padding: 20px; border-right: 1px solid #e0e0e0; }
    .main { padding: 32px; overflow-y: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .card {
      background: white;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .card-img { height: 160px; background: linear-gradient(135deg, #f0ede6, #e8e3d8); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .card-name { font-weight: 600; margin-top: 12px; }
    .card-price { font-size: 1.2rem; font-weight: 700; margin: 8px 0; }
    .card-specs { font-size: 0.8rem; color: #888; }
    .qty-row { display: flex; gap: 6px; margin: 10px 0; align-items: center; }
    .qty-btn { width: 28px; height: 28px; border: 1.5px solid #e0e0e0; background: white; cursor: pointer; border-radius: 50%; }
    .qty-val { min-width: 30px; text-align: center; }
    .btn-add { background: var(--ink); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 12px; }
    .btn-add:hover { background: var(--gold); }
    .cart-panel { position: fixed; right: 0; top: 0; width: 420px; height: 100vh; background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.1); z-index: 1000; transform: translateX(120%); transition: 0.3s; display: flex; flex-direction: column; }
    .cart-panel.open { transform: translateX(0); }
    .cart-header { padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }
    .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
    .cart-item { padding: 12px 0; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }
    .cart-footer { padding: 20px; border-top: 1px solid #e0e0e0; }
    .cart-total { font-size: 1.3rem; font-weight: 700; margin: 12px 0; }
    .btn-checkout { width: 100%; padding: 12px; background: var(--ink); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
    .modal.open { opacity: 1; pointer-events: all; }
    .modal-content { background: white; padding: 32px; border-radius: 16px; max-width: 500px; width: 90%; }
    @media (max-width: 900px) { .sidebar { display: none; } .container { grid-template-columns: 1fr; } .cart-panel { width: 100%; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">Shop<span>Easy</span></div>
    <div class="search">
      <input type="text" id="search" placeholder="Search products…" />
      <button onclick="handleSearch()">🔍</button>
    </div>
    <button class="btn-icon" onclick="toggleCart()">🛍 Cart <span class="cart-count" id="cartCount" style="display:none">0</span></button>
  </header>

  <nav id="nav"></nav>

  <div class="container">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>

  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Cart</h2>
      <button onclick="toggleCart()" style="border: none; background: none; cursor: pointer; font-size: 1.2rem;">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">Total: ₹<span id="cartTotal">0</span></div>
      <button class="btn-checkout" onclick="checkout()">Checkout</button>
    </div>
  </div>

  <div class="modal" id="successModal">
    <div class="modal-content">
      <h2>✓ Order Placed!</h2>
      <p style="margin: 16px 0; color: #888;">Your order has been successfully placed.</p>
      <button class="btn-checkout" onclick="closeModal()">Continue Shopping</button>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000/api"; // Change to your deployed backend
    let allProducts = {};
    let currentCategory = null;
    let userId = localStorage.userId || (localStorage.userId = Date.now().toString());

    (async () => {
      const cats = await fetch(`${API}/categories`).then(r => r.json());
      const nav = document.getElementById("nav");
      nav.innerHTML = cats.map((c, i) => `<div class="nav-item ${i === 0 ? "active" : ""}" onclick="selectCategory('${c}')">${c}</div>`).join("");
      selectCategory(cats[0]);
    })();

    async function selectCategory(cat) {
      currentCategory = cat;
      const subs = await fetch(`${API}/categories/${cat}`).then(r => r.json());
      const sidebar = document.getElementById("sidebar");
      sidebar.innerHTML = subs.map(s => `<div style="padding: 10px; cursor: pointer; background: #f0f0f0; margin-bottom: 8px; border-radius: 6px;" onclick="selectSub('${cat}', '${s}')">${s}</div>`).join("");
      selectSub(cat, subs[0]);
    }

    async function selectSub(cat, sub) {
      const products = await fetch(`${API}/products/${cat}/${sub}`).then(r => r.json());
      const main = document.getElementById("main");
      main.innerHTML = `<h1>${cat} > ${sub}</h1><div class="grid" style="margin-top: 20px;">${
        products.map((p, i) => `
          <div class="card">
            <div class="card-img">📦</div>
            <div class="card-name">${p.brand} ${p.model}</div>
            <div class="card-specs">${p.specs}</div>
            <div class="card-price">₹${p.price}</div>
            <div class="qty-row">
              <button class="qty-btn" onclick="updateQty(this, -1)">−</button>
              <span class="qty-val" data-qty="1">1</span>
              <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
            </div>
            <button class="btn-add" onclick="addCart('${p.brand} ${p.model}', ${p.price}, this)">Add to Cart</button>
          </div>
        `).join("")
      }</div>`;
    }

    function updateQty(btn, delta) {
      const qty = btn.parentElement.querySelector(".qty-val");
      qty.dataset.qty = Math.max(1, parseInt(qty.dataset.qty) + delta);
      qty.textContent = qty.dataset.qty;
    }

    async function addCart(name, price, btn) {
      const qty = parseInt(btn.parentElement.querySelector(".qty-val").dataset.qty);
      await fetch(`${API}/cart/${userId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ item: { name, price, qty } })
      });
      updateCartUI();
    }

    async function updateCartUI() {
      const cart = await fetch(`${API}/cart/${userId}`).then(r => r.json());
      const count = cart.items?.length || 0;
      document.getElementById("cartCount").style.display = count > 0 ? "flex" : "none";
      document.getElementById("cartCount").textContent = count;

      const cartItems = document.getElementById("cartItems");
      const total = cart.items?.reduce((s, i) => s + i.price * i.qty, 0) || 0;
      cartItems.innerHTML = (cart.items || []).map((item, i) => `
        <div class="cart-item">
          <div>
            <div style="font-weight: 600;">${item.name}</div>
            <div style="font-size: 0.8rem; color: #888;">₹${item.price} x ${item.qty}</div>
            <input type="number" value="${item.qty}" min="1" onchange="updateCartItem(${i}, this.value)" style="width: 50px; margin-top: 4px; padding: 4px;" />
            <button onclick="removeCart(${i})" style="margin-left: 8px; padding: 4px 8px; background: #f0f0f0; border: none; cursor: pointer; border-radius: 4px;">Remove</button>
          </div>
          <div style="font-weight: 700;">₹${item.price * item.qty}</div>
        </div>
      `).join("");
      document.getElementById("cartTotal").textContent = total;
    }

    async function updateCartItem(idx, qty) {
      await fetch(`${API}/cart/${userId}/${idx}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ qty: parseInt(qty) })
      });
      updateCartUI();
    }

    async function removeCart(idx) {
      const cart = await fetch(`${API}/cart/${userId}`).then(r => r.json());
      cart.items.splice(idx, 1);
      if (cart.items.length === 0) {
        await fetch(`${API}/cart/${userId}`, { method: "DELETE" });
      } else {
        await fetch(`${API}/cart/${userId}/${idx}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ qty: -1 })
        });
      }
      updateCartUI();
    }

    async function checkout() {
      await fetch(`${API}/checkout/${userId}`, { method: "POST" });
      document.getElementById("cartPanel").classList.remove("open");
      document.getElementById("successModal").classList.add("open");
      updateCartUI();
    }

    function closeModal() {
      document.getElementById("successModal").classList.remove("open");
    }

    function toggleCart() {
      document.getElementById("cartPanel").classList.toggle("open");
    }

    updateCartUI();
  </script>
</body>
</html>
